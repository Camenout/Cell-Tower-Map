<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта вышек сотовой связи</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>
    
    <!-- ЛЕВАЯ ПАНЕЛЬ — всё управление здесь -->
    <div class="left-panel" id="leftPanel">
        <!-- Секция: Информация о вышке -->
        <div class="panel-section">
            <div class="section-title">📡 Вышка</div>
            <div id="towerInfo" class="tower-card">
                Загрузка...
            </div>
        </div>
        
        <!-- Секция: Управление -->
        <div class="panel-section">
            <div class="section-title">🎯 Управление</div>
            
            <button class="control-btn btn-yandex" onclick="openInYandexMaps()">
                🗺️ Открыть в Яндекс.Картах
            </button>
            
            <button class="control-btn btn-info" onclick="toggleAddMode()" id="modeBtn">
                ✏️ Добавление точек: ВКЛ
            </button>

            <button class="control-btn btn-primary" id="toggleZonesBtn" onclick="toggleGreenZones()" style="background: #4CAF50;">
            🟢 Зелёные зоны: ВКЛ
            </button>
            
        </div>
        
        <!-- Секция: Добавление по координатам -->
        <div class="panel-section">
            <div class="section-title">📍 Добавить по координатам</div>
            
            <div class="coord-input-group">
                <input type="text" id="coordInput" class="coord-input" 
                       placeholder="55.751244, 37.618423" 
                       title="Введите координаты в формате: широта, долгота">
            </div>
            
            <button class="control-btn btn-primary" onclick="addPointByCoords()">
                ➕ Добавить точку
            </button>
        </div>
        
        <!-- Секция: Список точек -->
        <div class="panel-section">
            <div class="section-title">
                📌 Добавленные точки 
                <span class="point-count" id="pointCount">0</span>
            </div>
            
            <div class="points-list" id="pointsContainer">
                <div class="empty-message">Нет добавленных точек</div>
            </div>
            
            <button class="control-btn btn-danger" onclick="clearAllPoints()" style="margin-top: 8px;">
                🗑️ Очистить все точки
            </button>
        </div>
    </div>

    <!-- КНОПКА СВОРАЧИВАНИЯ МЕНЮ -->
    <button class="toggle-panel-btn" id="togglePanelBtn" onclick="togglePanel()" title="Свернуть панель">
        <div class="hamburger-line"></div>
        <div class="hamburger-line"></div>
        <div class="hamburger-line"></div>
    </button>
    
    <div class="status-bar" id="statusBar">
        🗺️ Карта готова
    </div>

    <script src="script.js"></script>
</body>
</html>
